description: >-
  FinOps view of Huly spend. Huly has two distinct cost models. Self-hosting
  the open-source platform (EPL-2.0) carries no license fee - cost is the
  operator's own infrastructure (compute, storage, network, ops). Huly Cloud
  is billed as flat per-workspace monthly subscriptions across fixed tiers
  (Common free, Rare $19.99, Epic $99.99, Legendary $399.99) that bundle
  storage and audio/video traffic allowances, plus a custom Enterprise plan.
notes: >-
  Cloud tier prices reflect the Huly pricing page at capture time and are per
  workspace per month; AI feature inclusions were TBD. Self-hosted cost is
  external infrastructure, not a Huly charge. Verify current tiers during
  reconciliation.
