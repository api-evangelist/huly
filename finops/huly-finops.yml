meters:
- name: workspace_subscription
  description: Flat monthly Huly Cloud subscription per workspace, by plan tier.
  unit: workspace
  aggregation: sum
  dimensions:
  - account
  - plan
- name: cloud_storage
  description: Storage consumed against the workspace plan allowance (10GB to 10TB).
  unit: gigabytes
  aggregation: max
  dimensions:
  - account
  - workspace
- name: cloud_av_traffic
  description: Audio/video traffic consumed against the workspace plan allowance (10GB to 2TB).
  unit: gigabytes
  aggregation: sum
  dimensions:
  - account
  - workspace
- name: self_hosted_infrastructure
  description: Operator-borne infrastructure cost for self-hosting the open-source platform (no Huly license fee).
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
principles:
- name: Visibility
  description: Track which workspaces sit on which Cloud tier; for self-hosted, monitor underlying compute/storage/network spend.
- name: Allocation
  description: Map workspaces (and self-hosted deployments) to teams/cost centers.
- name: Optimization
  description: Right-size the Cloud tier to actual storage/traffic use; self-host on owned infrastructure when it is cheaper than the matching Cloud tier.
- name: Accountability
  description: Assign an owner per workspace or deployment and review the monthly subscription or infrastructure bill against budget.
