aid: huly
url: https://raw.githubusercontent.com/api-evangelist/huly/refs/heads/main/apis.yml
name: Huly
kind: company
description: Huly is an open-source, all-in-one project management and team collaboration
  platform (an alternative to Linear, Jira, Slack, and Notion) built around modules
  like Tracker and Documents. Programmatic access is delivered primarily as a Node.js
  SDK (@hcengineering/api-client) that connects to the platform transactor over
  WebSocket or REST, rather than a broad public HTTP API. Huly is available as free,
  self-hostable open source (github.com/hcengineering) and as managed Huly Cloud.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Project Management
- Collaboration
- Open Source
- Productivity
- SDK
