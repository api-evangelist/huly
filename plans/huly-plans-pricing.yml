- Plans
description: >-
  Huly is available two ways. The open-source platform is free to self-host
  under the Eclipse Public License 2.0 (you pay only for your own
  infrastructure). Managed Huly Cloud is offered in usage-tiered workspace
  plans - Common (free), Rare, Epic, and Legendary - that scale storage and
  audio/video traffic while keeping users and Huly Objects unlimited, plus a
  custom Enterprise plan. AI feature inclusions per tier were not finalized
  on the pricing page at capture time and are marked as such.
notes: >-
  Prices reflect the Huly Cloud pricing page at the time of capture and are
  per workspace per month. AI feature availability per tier was listed as
  TBD. Verify current tiers, limits, and AI inclusions on the Huly pricing
  page during reconciliation.
sources:
- https://huly.io/pricing
- https://huly.io/
- https://github.com/hcengineering/platform
